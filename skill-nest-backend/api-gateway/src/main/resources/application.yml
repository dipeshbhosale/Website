server:
  port: ${API_GATEWAY_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:3001"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # Auth Service
        - id: auth-service
          uri: http://localhost:${AUTH_SERVICE_PORT:8081}
          predicates:
            - Path=/api/auth/**

        # Course Service
        - id: course-service
          uri: http://localhost:${COURSE_SERVICE_PORT:8082}
          predicates:
            - Path=/api/courses/**

        # User Service
        - id: user-service
          uri: http://localhost:${USER_SERVICE_PORT:8083}
          predicates:
            - Path=/api/users/**

        # Enrollment Service
        - id: enrollment-service
          uri: http://localhost:${ENROLLMENT_SERVICE_PORT:8084}
          predicates:
            - Path=/api/enrollments/**

        # Calendar Service
        - id: calendar-service
          uri: http://localhost:${CALENDAR_SERVICE_PORT:8085}
          predicates:
            - Path=/api/calendar/**

firebase:
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:./config/firebase-service-account.json}
  project-id: ${FIREBASE_PROJECT_ID:skill-nest-dccb0}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.skillnest: DEBUG
    org.springframework.cloud.gateway: INFO
